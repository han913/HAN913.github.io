<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>照片审核后台</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<main class="upload-page">
  <section class="admin-card">
    <p class="section-tag">Admin</p>
    <h1>照片审核后台</h1>
    <p class="upload-desc">输入后台密码后，可以审核同学上传的毕业照。</p>

    <div class="admin-login">
      <input type="password" id="adminPass" placeholder="输入审核密码">
      <button id="loginBtn" type="button">进入后台</button>
    </div>

    <p id="adminStatus" class="upload-tip"></p>

    <div id="pendingList" class="pending-list"></div>

    <a class="back-link" href="index.html">返回相册首页</a>
  </section>
</main>

<script>
const passInput = document.getElementById("adminPass");
const statusText = document.getElementById("adminStatus");
const pendingList = document.getElementById("pendingList");
const loginBtn = document.getElementById("loginBtn");

loginBtn.addEventListener("click", loadPending);

function previewUrl(url) {
  if (!url) return "";
  return url.replace("/upload/", "/upload/f_auto,q_auto,w_700/");
}

function escapeHtml(text) {
  return String(text || "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

async function readResponse(res) {
  const text = await res.text();

  try {
    return JSON.parse(text);
  } catch (e) {
    return {
      error: text || `HTTP ${res.status}`
    };
  }
}

async function loadPending() {
  const pass = passInput.value.trim();

  if (!pass) {
    statusText.textContent = "请先输入密码。";
    return;
  }

  try {
    statusText.textContent = "正在加载待审核照片...";
    pendingList.innerHTML = "";

    const res = await fetch("/.netlify/functions/list-pending", {
      method: "GET",
      headers: {
        "x-admin-pass": pass
      },
      cache: "no-store"
    });

    const data = await readResponse(res);

    if (!res.ok) {
      throw new Error(data.error || `加载失败，状态码：${res.status}`);
    }

    const photos = Array.isArray(data) ? data : [];

    if (photos.length === 0) {
      statusText.textContent = "暂无待审核照片。";
      return;
    }

    statusText.textContent = `共有 ${photos.length} 张待审核照片。`;

    photos.forEach((photo) => {
      const card = document.createElement("div");
      card.className = "pending-card";

      const img = document.createElement("img");
      img.src = previewUrl(photo.secure_url);
      img.alt = "待审核照片";

      const info = document.createElement("div");
      info.className = "pending-info";

      const name = document.createElement("strong");
      name.textContent = photo.name || "匿名";

      const message = document.createElement("p");
      message.textContent = photo.message || "";

      const time = document.createElement("p");
      time.className = "upload-tip";
      time.textContent = photo.created_at
        ? new Date(photo.created_at).toLocaleString()
        : "未知时间";

      const actions = document.createElement("div");
      actions.className = "admin-actions";

      const approveBtn = document.createElement("button");
      approveBtn.type = "button";
      approveBtn.textContent = "通过";
      approveBtn.addEventListener("click", () => {
        reviewPhoto(photo.id, "approve");
      });

      const rejectBtn = document.createElement("button");
      rejectBtn.type = "button";
      rejectBtn.className = "danger";
      rejectBtn.textContent = "拒绝";
      rejectBtn.addEventListener("click", () => {
        reviewPhoto(photo.id, "reject");
      });

      actions.appendChild(approveBtn);
      actions.appendChild(rejectBtn);

      info.appendChild(name);
      info.appendChild(message);
      info.appendChild(time);
      info.appendChild(actions);

      card.appendChild(img);
      card.appendChild(info);

      pendingList.appendChild(card);
    });
  } catch (err) {
    console.error("loadPending error:", err);
    statusText.textContent = "密码错误或加载失败：" + err.message;
  }
}

async function reviewPhoto(id, action) {
  const pass = passInput.value.trim();

  if (!pass) {
    alert("请先输入后台密码。");
    return;
  }

  if (!id) {
    alert("操作失败：照片 ID 为空。");
    return;
  }

  try {
    const res = await fetch("/.netlify/functions/approve-photo", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-admin-pass": pass
      },
      body: JSON.stringify({
        id: id,
        action: action
      }),
      cache: "no-store"
    });

    const data = await readResponse(res);

    if (!res.ok || data.ok === false) {
      throw new Error(data.error || `操作失败，状态码：${res.status}`);
    }

    alert(action === "approve" ? "审核通过。" : "已拒绝。");
    await loadPending();
  } catch (err) {
    console.error("reviewPhoto error:", err);
    alert("操作失败：" + err.message);
  }
}
</script>

</body>
</html>
