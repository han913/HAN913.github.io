.album-live-panel {
  width: min(1100px, calc(100% - 32px));
  margin: 48px auto 24px;
  padding: 24px;
  border-radius: 28px;
  background: rgba(255, 255, 255, 0.72);
  box-shadow: 0 18px 50px rgba(95, 75, 50, 0.12);
  backdrop-filter: blur(10px);
}

.album-stats {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 16px;
}

.album-stat-card {
  padding: 20px;
  border-radius: 22px;
  background: rgba(255, 248, 236, 0.9);
  border: 1px solid rgba(220, 185, 135, 0.35);
}

.album-stat-card span {
  display: block;
  font-size: 14px;
  color: #8a6b45;
  margin-bottom: 8px;
}

.album-stat-card strong {
  font-size: 34px;
  color: #2b2b2b;
}

.fullscreen-barrage-layer {
  position: fixed;
  inset: 0;
  z-index: 80;
  pointer-events: none;
  overflow: hidden;
}

.fullscreen-barrage-item {
  position: absolute;
  left: 100vw;
  white-space: nowrap;
  padding: 7px 16px;
  border-radius: 999px;
  background: rgba(255, 255, 255, 0.72);
  color: #2b2b2b;
  font-size: 16px;
  font-weight: 600;
  text-shadow: 0 1px 2px rgba(255, 255, 255, 0.7);
  box-shadow: 0 8px 22px rgba(70, 45, 20, 0.15);
  backdrop-filter: blur(8px);
  animation-name: fullscreenBarrageMove;
  animation-timing-function: linear;
  animation-fill-mode: forwards;
}

@keyframes fullscreenBarrageMove {
  from {
    transform: translateX(0);
  }
  to {
    transform: translateX(-150vw);
  }
}

.barrage-control {
  position: fixed;
  left: 50%;
  bottom: 22px;
  transform: translateX(-50%);
  z-index: 90;
  width: min(680px, calc(100% - 28px));
  display: grid;
  grid-template-columns: 120px 1fr 92px;
  gap: 10px;
  padding: 12px;
  border-radius: 999px;
  background: rgba(255, 255, 255, 0.78);
  box-shadow: 0 16px 45px rgba(70, 45, 20, 0.18);
  backdrop-filter: blur(12px);
}

.barrage-control input {
  min-width: 0;
  border: 1px solid rgba(210, 175, 125, 0.45);
  border-radius: 999px;
  padding: 11px 14px;
  outline: none;
  background: rgba(255, 250, 242, 0.95);
  color: #2b2b2b;
}

.barrage-control button {
  border: none;
  border-radius: 999px;
  background: #ffd891;
  color: #3a2c1d;
  font-weight: 700;
  cursor: pointer;
}

.barrage-control button:disabled {
  opacity: 0.6;
  cursor: not-allowed;
}

body.lightbox-open .fullscreen-barrage-layer,
body.lightbox-open .barrage-control {
  display: none;
}

@media (max-width: 720px) {
  .album-stats {
    grid-template-columns: 1fr;
  }

  .barrage-control {
    grid-template-columns: 1fr 72px;
    border-radius: 24px;
  }

  .barrage-control #barrageName {
    grid-column: 1 / 3;
  }

  .fullscreen-barrage-item {
    font-size: 14px;
  }
}

  <script>
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightboxImg');
    const closeBtn = document.getElementById('closeBtn');
    const downloadBtn = document.getElementById('downloadBtn');
    const approvedGallery = document.getElementById('approvedGallery');
    const pendingCountEl = document.getElementById('pendingCount');
    const approvedCountEl = document.getElementById('approvedCount');
    const barrageLayer = document.getElementById('fullscreenBarrageLayer');
    const barrageForm = document.getElementById('barrageForm');
    const barrageName = document.getElementById('barrageName');
    const barrageInput = document.getElementById('barrageInput');
    const barrageSendBtn = document.getElementById('barrageSendBtn');

    let barrageIndex = 0;
    let barrageTimer = null;
    let barrageMessages = [];

    function openLightbox(previewUrl, originalUrl, filename) {
      lightboxImg.src = previewUrl;
      downloadBtn.href = originalUrl;
      downloadBtn.setAttribute('download', filename || 'photo.jpg');
      lightbox.classList.add('show');
      document.body.classList.add('lightbox-open');
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
      lightbox.classList.remove('show');
      document.body.classList.remove('lightbox-open');
      lightboxImg.src = '';
      downloadBtn.href = '';
      document.body.style.overflow = '';
    }

    function bindStaticGallery() {
      const galleryImages = document.querySelectorAll('#gallery img');

      galleryImages.forEach(img => {
        img.addEventListener('click', () => {
          openLightbox(
            img.dataset.preview,
            img.dataset.original,
            img.dataset.original.split('/').pop()
          );
        });
      });
    }

    function cloudinaryTransform(url, transform) {
      if (!url || !url.includes('/upload/')) {
        return url || '';
      }

      return url.replace('/upload/', `/upload/${transform}/`);
    }

    function getPhotoFilename(photo) {
      if (photo.public_id && photo.format) {
        return `${photo.public_id}.${photo.format}`;
      }

      return 'photo.jpg';
    }

    async function loadApprovedPhotos() {
      try {
        approvedGallery.innerHTML = '<p class="upload-tip">正在加载投稿照片...</p>';

        const res = await fetch('/.netlify/functions/list-approved?t=' + Date.now(), {
          cache: 'no-store'
        });

        if (!res.ok) {
          throw new Error('HTTP ' + res.status);
        }

        const photos = await res.json();

        if (!Array.isArray(photos) || photos.length === 0) {
          approvedGallery.innerHTML = '<p class="upload-tip">暂无审核通过的投稿照片。</p>';
          return;
        }

        approvedGallery.innerHTML = '';

        photos.forEach(photo => {
          if (!photo.secure_url) return;

          const thumb = cloudinaryTransform(
            photo.secure_url,
            'c_limit,w_520,q_auto:eco,f_auto'
          );

          const original = photo.secure_url;

          const download = cloudinaryTransform(
            photo.secure_url,
            'fl_attachment'
          );

          const figure = document.createElement('figure');
          const img = document.createElement('img');

          img.src = thumb;
          img.dataset.preview = original;
          img.dataset.original = download;
          img.alt = photo.name ? `${photo.name}的投稿照片` : '投稿照片';
          img.loading = 'lazy';
          img.decoding = 'async';

          img.addEventListener('click', () => {
            openLightbox(original, download, getPhotoFilename(photo));
          });

          figure.appendChild(img);
          approvedGallery.appendChild(figure);
        });

      } catch (err) {
        console.error('加载审核通过照片失败：', err);
        approvedGallery.innerHTML = '<p class="upload-tip">投稿照片加载失败，请稍后刷新重试。</p>';
      }
    }

    async function loadAlbumStats() {
      try {
        const res = await fetch('/.netlify/functions/album-stats?t=' + Date.now(), {
          cache: 'no-store'
        });

        if (!res.ok) {
          throw new Error('HTTP ' + res.status);
        }

        const data = await res.json();

        pendingCountEl.textContent = typeof data.pendingCount === 'number'
          ? data.pendingCount
          : '--';

        approvedCountEl.textContent = typeof data.approvedCount === 'number'
          ? data.approvedCount
          : '--';

        barrageMessages = Array.isArray(data.messages) ? data.messages : [];
        startBarrage();
      } catch (err) {
        console.error('加载相册统计失败：', err);
        pendingCountEl.textContent = '--';
        approvedCountEl.textContent = '--';
        barrageMessages = [];
      }
    }

    function makeBarrageText(item) {
      const name = item.name || '匿名';
      const message = item.message || '';
      return `${name}：${message}`;
    }

    function createBarrage(item) {
      if (!item || !item.message || !String(item.message).trim()) return;

      const el = document.createElement('div');
      el.className = 'fullscreen-barrage-item';
      el.textContent = makeBarrageText(item);

      const viewportHeight = window.innerHeight || 720;
      const inputReserve = 120;
      const usableHeight = Math.max(220, viewportHeight - inputReserve);
      const top = 70 + Math.random() * Math.max(80, usableHeight - 140);

      el.style.top = top + 'px';
      el.style.animationDuration = (12 + Math.random() * 8) + 's';

      barrageLayer.appendChild(el);

      setTimeout(() => {
        if (el && el.parentNode) {
          el.parentNode.removeChild(el);
        }
      }, 22000);
    }

    function startBarrage() {
      if (barrageTimer) {
        clearInterval(barrageTimer);
        barrageTimer = null;
      }

      barrageLayer.innerHTML = "";

      if (!barrageMessages.length) {
        return;
      }

      barrageMessages.slice(0, 8).forEach((item, index) => {
        setTimeout(() => {
          createBarrage(item);
        }, index * 900);
      });

      barrageTimer = setInterval(() => {
        if (!barrageMessages.length) return;

        const item = barrageMessages[barrageIndex % barrageMessages.length];
        barrageIndex += 1;
        createBarrage(item);
      }, 1800);
    }

    async function submitBarrage(e) {
      e.preventDefault();

      const name = barrageName.value.trim() || "匿名";
      const message = barrageInput.value.trim();

      if (!message) {
        alert("请输入弹幕留言。");
        return;
      }

      try {
        barrageSendBtn.disabled = true;
        barrageSendBtn.textContent = "发送中";

        const res = await fetch('/.netlify/functions/submit-barrage?t=' + Date.now(), {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            name,
            message
          }),
          cache: 'no-store'
        });

        const text = await res.text();
        let data = {};

        try {
          data = JSON.parse(text);
        } catch (err) {
          data = { error: text };
        }

        if (!res.ok || data.ok === false) {
          throw new Error(data.error || '发送失败');
        }

        const item = data.item || {
          name,
          message,
          created_at: new Date().toISOString(),
          source: "barrage"
        };

        barrageMessages.unshift(item);
        createBarrage(item);

        barrageInput.value = "";
        loadAlbumStats();
      } catch (err) {
        console.error("发送弹幕失败：", err);
        alert("发送失败：" + err.message);
      } finally {
        barrageSendBtn.disabled = false;
        barrageSendBtn.textContent = "发送";
      }
    }

    closeBtn.addEventListener('click', closeLightbox);

    lightbox.addEventListener('click', e => {
      if (e.target === lightbox) {
        closeLightbox();
      }
    });

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') {
        closeLightbox();
      }
    });

    barrageForm.addEventListener('submit', submitBarrage);

    bindStaticGallery();
    loadApprovedPhotos();
    loadAlbumStats();
