<!DOCTYPE html>

<head>

  <title>毕业纪念相册</title>
  <link rel="stylesheet" href="style.css">

<body>

      <h2>照片墙</h2>
      <p>点击照片可以查看大图。页面已使用压缩缩略图加载，打开速度会比直接加载原图快很多。</p>
    </section>

    <section class="gallery" id="gallery">
      <figure>

        <figcaption>毕业照 01</figcaption>
      </figure>

        <figcaption>毕业照 02</figcaption>
      </figure>
      <figure>
        <img src="photos/thumb/DSC4841.webp" data-full="photos/large/DSC4841.webp" alt="毕业照3" loading="lazy">
        <figcaption>毕业照 03</figcaption>
      </figure>
      <figure>
        <img src="photos/thumb/DSC4844.webp" data-full="photos/large/DSC4844.webp" alt="毕业照4" loading="lazy">
        <figcaption>毕业照 04</figcaption>
      </figure>
      <figure>
        <img src="photos/thumb/DSC4852.webp" data-full="photos/large/DSC4852.webp" alt="毕业照5" loading="lazy">
        <figcaption>毕业照 05</figcaption>
      </figure>
      <figure>
        <img src="photos/thumb/DSC4853.webp" data-full="photos/large/DSC4853.webp" alt="毕业照6" loading="lazy">
        <figcaption>毕业照 06</figcaption>
      </figure>
      <figure>
        <img src="photos/thumb/DSC4854.webp" data-full="photos/large/DSC4854.webp" alt="毕业照7" loading="lazy">
        <figcaption>毕业照 07</figcaption>

      </figure>
    </section>
  </main>

  <div class="lightbox" id="lightbox">
    <button class="close" id="closeBtn">×</button>
    <img id="lightboxImg" src="" alt="照片预览">
  </div>

  <footer>
    <p>Graduation Album · 2026</p>
  </footer>

  <script>
    const galleryImages = document.querySelectorAll('.gallery img');
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightboxImg');
    const closeBtn = document.getElementById('closeBtn');

    galleryImages.forEach(img => {
      img.addEventListener('click', () => {
        lightboxImg.src = img.dataset.full;
        lightbox.classList.add('show');
      });
    });

    function closeLightbox() {
      lightbox.classList.remove('show');
      lightboxImg.src = '';
    }

    closeBtn.addEventListener('click', closeLightbox);
    lightbox.addEventListener('click', e => {
      if (e.target === lightbox) closeLightbox();
    });
  </script>

</body>
</html>
