      <script>
async function loadApprovedPhotos() {
  const box = document.getElementById("approvedGallery");
  if (!box) return;

  const res = await fetch("/.netlify/functions/list-approved");
  const photos = await res.json();

  box.innerHTML = "";

  photos.forEach(photo => {
    const thumb = photo.secure_url.replace("/upload/", "/upload/f_auto,q_auto,w_600/");
    const preview = photo.secure_url.replace("/upload/", "/upload/f_auto,q_auto,w_1800/");
    const download = photo.secure_url.replace("/upload/", "/upload/fl_attachment/");

    const figure = document.createElement("figure");
    figure.innerHTML = `
      <img src="${thumb}" data-preview="${preview}" data-original="${download}" alt="投稿照片" loading="lazy" decoding="async">
    `;

    figure.querySelector("img").addEventListener("click", () => {
      lightboxImg.src = preview;
      downloadBtn.href = download;
      downloadBtn.setAttribute("download", "photo.jpg");
      lightbox.classList.add("show");
      document.body.style.overflow = "hidden";
    });

    box.appendChild(figure);
  });
}

loadApprovedPhotos();
</script>

  <div class="lightbox" id="lightbox">
    <button class="close" id="closeBtn">×</button>
    <img id="lightboxImg" src="" alt="照片预览">
    <a id="downloadBtn" class="download-btn" href="" download>下载原图</a>
  </div>

  <footer>
    <p>Graduation Album · 2026</p>
  </footer>

  <script>
    const galleryImages = document.querySelectorAll('.gallery img');
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightboxImg');
    const closeBtn = document.getElementById('closeBtn');
    const downloadBtn = document.getElementById('downloadBtn');

    galleryImages.forEach(img => {
      img.addEventListener('click', () => {
        lightboxImg.src = img.dataset.preview;
        downloadBtn.href = img.dataset.original;
        downloadBtn.setAttribute('download', img.dataset.original.split('/').pop());
        lightbox.classList.add('show');
        document.body.style.overflow = 'hidden';
      });
    });

    function closeLightbox() {
      lightbox.classList.remove('show');
      lightboxImg.src = '';
      downloadBtn.href = '';
      document.body.style.overflow = '';
    }

    closeBtn.addEventListener('click', closeLightbox);

    lightbox.addEventListener('click', e => {
      if (e.target === lightbox) {
        closeLightbox();
      }
    });

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') {
        closeLightbox();
      }
    });
  </script>
