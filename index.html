<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>毕业纪念相册</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="hero">
    <div class="hero-mask"></div>
    <div class="hero-content">
      <p class="eyebrow">GRADUATION · ALBUM</p>
      <h1>毕业纪念相册</h1>
      <p class="subtitle">把青春留在镜头里，把这一刻留给未来。</p>
      <a href="#gallery" class="hero-button">进入相册</a>
    </div>
  </header>

  <main>
    <section class="intro">
      <p class="section-tag">Photos</p>
      <h2>我们的毕业瞬间</h2>
      <p>点击照片可以放大查看，预览图经过压缩以提升加载速度；如需保存高清版本，可在预览界面下载原始图片。</p>
    </section>

    <section class="gallery" id="gallery">
      <figure>
        <img src="photos/thumb/DSC4831.webp" data-preview="photos/large/DSC4831.webp" data-original="images/DSC4831.JPG" alt="毕业照1" loading="lazy" decoding="async">
      </figure>
      <figure>
        <img src="photos/thumb/DSC4835.webp" data-preview="photos/large/DSC4835.webp" data-original="images/DSC4835.JPG" alt="毕业照2" loading="lazy" decoding="async">
      </figure>
      <figure>
        <img src="photos/thumb/DSC4841.webp" data-preview="photos/large/DSC4841.webp" data-original="images/DSC4841.JPG" alt="毕业照3" loading="lazy" decoding="async">
      </figure>
      <figure>
        <img src="photos/thumb/DSC4844.webp" data-preview="photos/large/DSC4844.webp" data-original="images/DSC4844.JPG" alt="毕业照4" loading="lazy" decoding="async">
      </figure>
      <figure>
        <img src="photos/thumb/DSC4852.webp" data-preview="photos/large/DSC4852.webp" data-original="images/DSC4852.JPG" alt="毕业照5" loading="lazy" decoding="async">
      </figure>
      <figure>
        <img src="photos/thumb/DSC4853.webp" data-preview="photos/large/DSC4853.webp" data-original="images/DSC4853.JPG" alt="毕业照6" loading="lazy" decoding="async">
      </figure>
      <figure>
        <img src="photos/thumb/DSC4854.webp" data-preview="photos/large/DSC4854.webp" data-original="images/DSC4854.JPG" alt="毕业照7" loading="lazy" decoding="async">
      </figure>
      <figure>
        <img src="photos/thumb/DSC4861.webp" data-preview="photos/large/DSC4861.webp" data-original="images/DSC4861.JPG" alt="毕业照8" loading="lazy" decoding="async">
      </figure>
      <figure>
        <img src="photos/thumb/DSC4862.webp" data-preview="photos/large/DSC4862.webp" data-original="images/DSC4862.JPG" alt="毕业照9" loading="lazy" decoding="async">
      </figure>
      <figure>
        <img src="photos/thumb/DSC4863.webp" data-preview="photos/large/DSC4863.webp" data-original="images/DSC4863.JPG" alt="毕业照10" loading="lazy" decoding="async">
      </figure>
      <figure>
        <img src="photos/thumb/DSC4864.webp" data-preview="photos/large/DSC4864.webp" data-original="images/DSC4864.JPG" alt="毕业照11" loading="lazy" decoding="async">
      </figure>
      <figure>
        <img src="photos/thumb/DSC4866.webp" data-preview="photos/large/DSC4866.webp" data-original="images/DSC4866.JPG" alt="毕业照12" loading="lazy" decoding="async">

      <figure>
        <img src="photos/thumb/DSC4868.webp" data-preview="photos/large/DSC4868.webp" data-original="images/DSC4868.JPG" alt="毕业照13" loading="lazy" decoding="async">
      </figure>
      <figure>
        <img src="photos/thumb/DSC4869.webp" data-preview="photos/large/DSC4869.webp" data-original="images/DSC4869.JPG" alt="毕业照14" loading="lazy" decoding="async">
      </figure>
    </section>
  </main>

  <div class="lightbox" id="lightbox">
    <button class="close" id="closeBtn">×</button>
    <img id="lightboxImg" src="" alt="照片预览">
    <a id="downloadBtn" class="download-btn" href="" download>下载原图</a>
  </div>

  <footer>
    <p>Graduation Album · 2026</p>
  </footer>

  <script>
    const galleryImages = document.querySelectorAll('.gallery img');
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightboxImg');
    const closeBtn = document.getElementById('closeBtn');
    const downloadBtn = document.getElementById('downloadBtn');

    galleryImages.forEach(img => {
      img.addEventListener('click', () => {
        lightboxImg.src = img.dataset.preview;
        downloadBtn.href = img.dataset.original;
        lightbox.classList.add('show');
      });
    });

    function closeLightbox() {
      lightbox.classList.remove('show');
      lightboxImg.src = '';
      downloadBtn.href = '';
    }

    closeBtn.addEventListener('click', closeLightbox);

    lightbox.addEventListener('click', e => {
      if (e.target === lightbox) {
        closeLightbox();
      }
    });

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') {
        closeLightbox();
      }
    });
  </script>

</body>
</html>
