<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">

  <link rel="stylesheet" href="style.css">
  <style>
    .hero {
      background-image:
        linear-gradient(135deg, rgba(18, 18, 18, 0.72), rgba(18, 18, 18, 0.22)),
        url("photos_v2/large/DSC4817_large.webp");
    }
    .album-live-panel {
  width: min(1100px, calc(100% - 32px));
  margin: 48px auto 24px;
  padding: 24px;
  border-radius: 28px;
  background: rgba(255, 255, 255, 0.72);
  box-shadow: 0 18px 50px rgba(95, 75, 50, 0.12);
  backdrop-filter: blur(10px);
}

.album-stats {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 16px;
  margin-bottom: 22px;
}

.album-stat-card {
  padding: 20px;
  border-radius: 22px;
  background: rgba(255, 248, 236, 0.9);
  border: 1px solid rgba(220, 185, 135, 0.35);
}

.album-stat-card span {
  display: block;
  font-size: 14px;
  color: #8a6b45;
  margin-bottom: 8px;
}

.album-stat-card strong {
  font-size: 34px;
  color: #2b2b2b;
}

.barrage-box {
  position: relative;
  height: 150px;
  overflow: hidden;
  border-radius: 24px;
  background:
    linear-gradient(90deg, rgba(255, 238, 203, 0.92), rgba(255, 250, 242, 0.78)),
    radial-gradient(circle at top left, rgba(255, 206, 120, 0.45), transparent 45%);
  border: 1px solid rgba(220, 185, 135, 0.35);
}

.barrage-title {
  position: absolute;
  left: 18px;
  top: 14px;
  z-index: 2;
  font-size: 14px;
  color: #8a6b45;
  font-weight: 700;
}

.barrage-item {
  position: absolute;
  left: 100%;
  white-space: nowrap;
  padding: 8px 16px;
  border-radius: 999px;
  background: rgba(255, 255, 255, 0.82);
  box-shadow: 0 8px 24px rgba(100, 70, 35, 0.12);
  color: #3a2c1d;
  font-size: 15px;
  animation-name: barrageMove;
  animation-timing-function: linear;
  animation-iteration-count: infinite;
}

.barrage-empty {
  position: absolute;
  left: 18px;
  bottom: 18px;
  color: #9a7a52;
  font-size: 14px;
}

@keyframes barrageMove {
  from {
    transform: translateX(0);
  }
  to {
    transform: translateX(-150vw);
  }
}

@media (max-width: 720px) {
  .album-stats {
    grid-template-columns: 1fr;
  }

  .barrage-box {
    height: 130px;
  }

  .barrage-item {
    font-size: 13px;
  }
}
  </style>
</head>

  <div class="lightbox" id="lightbox">
    <button class="close" id="closeBtn">×</button>
    <img id="lightboxImg" src="" alt="照片预览">
    <a id="downloadBtn" class="download-btn" href="" download>下载原图</a>
  </div>

  <footer>
    <p>Graduation Album · 2026</p>
  </footer>

 <script>
  const lightbox = document.getElementById('lightbox');
  const lightboxImg = document.getElementById('lightboxImg');
  const closeBtn = document.getElementById('closeBtn');
  const downloadBtn = document.getElementById('downloadBtn');
  const approvedGallery = document.getElementById('approvedGallery');
  const pendingCountEl = document.getElementById('pendingCount');
  const approvedCountEl = document.getElementById('approvedCount');
  const barrageBox = document.getElementById('barrageBox');

  function openLightbox(previewUrl, originalUrl, filename) {
    lightboxImg.src = previewUrl;
    downloadBtn.href = originalUrl;
    downloadBtn.setAttribute('download', filename || 'photo.jpg');
    lightbox.classList.add('show');
    document.body.style.overflow = 'hidden';
  }

  function closeLightbox() {
    lightbox.classList.remove('show');
    lightboxImg.src = '';
    downloadBtn.href = '';
    document.body.style.overflow = '';
  }

  function bindStaticGallery() {
    const galleryImages = document.querySelectorAll('#gallery img');

    galleryImages.forEach(img => {
      img.addEventListener('click', () => {
        openLightbox(
          img.dataset.preview,
          img.dataset.original,
          img.dataset.original.split('/').pop()
        );
      });
    });
  }

  function cloudinaryTransform(url, transform) {
    if (!url || !url.includes('/upload/')) {
      return url || '';
    }

    return url.replace('/upload/', `/upload/${transform}/`);
  }

  function getPhotoFilename(photo) {
    if (photo.public_id && photo.format) {
      return `${photo.public_id}.${photo.format}`;
    }

    return 'photo.jpg';
  }

  async function loadApprovedPhotos() {
    try {
      approvedGallery.innerHTML = '<p class="upload-tip">正在加载投稿照片...</p>';

      const res = await fetch('/.netlify/functions/list-approved?t=' + Date.now(), {
        cache: 'no-store'
      });

      if (!res.ok) {
        throw new Error('HTTP ' + res.status);
      }

      const photos = await res.json();

      if (!Array.isArray(photos) || photos.length === 0) {
        approvedGallery.innerHTML = '<p class="upload-tip">暂无审核通过的投稿照片。</p>';
        return;
      }

      approvedGallery.innerHTML = '';

      photos.forEach(photo => {
        if (!photo.secure_url) return;

        const thumb = cloudinaryTransform(
          photo.secure_url,
          'c_limit,w_520,q_auto:eco,f_auto'
        );

        const original = photo.secure_url;

        const download = cloudinaryTransform(
          photo.secure_url,
          'fl_attachment'
        );

        const figure = document.createElement('figure');
        const img = document.createElement('img');

        img.src = thumb;
        img.dataset.preview = original;
        img.dataset.original = download;
        img.alt = photo.name ? `${photo.name}的投稿照片` : '投稿照片';
        img.loading = 'lazy';
        img.decoding = 'async';

        img.addEventListener('click', () => {
          openLightbox(original, download, getPhotoFilename(photo));
        });

        figure.appendChild(img);
        approvedGallery.appendChild(figure);
      });

    } catch (err) {
      console.error('加载审核通过照片失败：', err);
      approvedGallery.innerHTML = '<p class="upload-tip">投稿照片加载失败，请稍后刷新重试。</p>';
    }
  }

  async function loadAlbumStats() {
    try {
      const res = await fetch('/.netlify/functions/album-stats?t=' + Date.now(), {
        cache: 'no-store'
      });

      if (!res.ok) {
        throw new Error('HTTP ' + res.status);
      }

      const data = await res.json();

      pendingCountEl.textContent = typeof data.pendingCount === 'number'
        ? data.pendingCount
        : '--';

      approvedCountEl.textContent = typeof data.approvedCount === 'number'
        ? data.approvedCount
        : '--';

      renderBarrage(Array.isArray(data.messages) ? data.messages : []);
    } catch (err) {
      console.error('加载相册统计失败：', err);
      pendingCountEl.textContent = '--';
      approvedCountEl.textContent = '--';
      renderBarrage([]);
    }
  }

  function renderBarrage(messages) {
    barrageBox.innerHTML = '<div class="barrage-title">投稿留言弹幕</div>';

    if (!messages.length) {
      const empty = document.createElement('div');
      empty.className = 'barrage-empty';
      empty.textContent = '审核通过后的留言会在这里滚动显示。';
      barrageBox.appendChild(empty);
      return;
    }

    const rows = [48, 82, 116];

    messages.forEach((item, index) => {
      const text = item.message || '';
      if (!text.trim()) return;

      const danmaku = document.createElement('div');
      danmaku.className = 'barrage-item';
      danmaku.textContent = `${item.name || '匿名'}：${text}`;

      danmaku.style.top = rows[index % rows.length] + 'px';
      danmaku.style.animationDuration = 16 + (index % 6) * 2 + 's';
      danmaku.style.animationDelay = index * 1.2 + 's';

      barrageBox.appendChild(danmaku);
    });
  }

  closeBtn.addEventListener('click', closeLightbox);

  lightbox.addEventListener('click', e => {
    if (e.target === lightbox) {
      closeLightbox();
    }
  });

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      closeLightbox();
    }
  });

  bindStaticGallery();
  loadApprovedPhotos();
  loadAlbumStats();
</script>
